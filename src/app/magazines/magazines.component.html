<swiper  *ngFor="let slide of Slides; let i = index" >
  <ng-template swiperSlide >
       <ul>
      <li><img src=" {{ this.Slides[i].url }} " alt="" /></li>
      <li>{{ this.Slides[i].text.name }}</li>
      <li>Автор: {{ this.Slides[i].text.author }}</li>
      <li>Година: {{ this.Slides[i].text.Year }}</li>
      <li>Формат: {{ this.Slides[i].text.Format }}</li>
      <li>Страници: {{ this.Slides[i].text.Pages }}</li>
      <!-- <li><span class="material-icons">
      <a href="{{this.Slides[index].link}" target="blank">picture_as_pdf</a>
      </span>
      </li> -->
    </ul>
  </ng-template>
</swiper>
